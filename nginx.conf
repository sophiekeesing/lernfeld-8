events {}

http {
    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name ske.solutionshosted.de api.ske.solutionshosted.de;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # FRONTEND ROUTING (HTTPS)
    server {
        listen 443 ssl;
        server_name ske.solutionshosted.de;

        ssl_certificate /etc/letsencrypt/live/ske.solutionshosted.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ske.solutionshosted.de/privkey.pem;

        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # BACKEND ROUTING (HTTPS)
    server {
        listen 443 ssl;
        server_name api.ske.solutionshosted.de;

        ssl_certificate /etc/letsencrypt/live/ske.solutionshosted.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ske.solutionshosted.de/privkey.pem;

        location / {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
