name: CI Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  # ─── QA Measure 1: Linting ───────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint

  # ─── QA Measure 2: Format Check ──────────────────────────────
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx prettier --check "frontend/src/**/*.{ts,tsx,css}" "backend/**/*.ts" --ignore-path .gitignore

  # ─── QA Measure 3: Type Checking ─────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run typecheck
      - run: cd backend && npm ci
      - run: cd backend && npm run typecheck

  # ─── QA Measure 3: Unit Tests (Frontend) ─────────────────────
  test-frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm test

  # ─── QA Measure 4: Integration Tests (Backend) ───────────────
  test-backend:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    env:
      SPOTIFY_CLIENT_ID: test-client-id
      SPOTIFY_CLIENT_SECRET: test-client-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm test

  # ─── QA Measure 5: Build Verification ────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ─── QA Measure 6: Security Audit ────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd frontend && npm ci && npm audit --audit-level=high || true
      - run: cd backend && npm ci && npm audit --audit-level=high || true
