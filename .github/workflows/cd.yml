name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # Run all CI checks first
  ci:
    uses: ./.github/workflows/ci.yml

  # ─── Deploy to Production ─────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build Frontend
        run: |
          cd frontend && npm ci && npm run build

      - name: Build Docker Images
        run: docker compose build

      # Placeholder: replace with your actual deployment target
      # Examples: push to container registry, deploy to cloud, etc.
      - name: Deploy (placeholder)
        run: |
          echo "✅ Build successful — ready for deployment"
          echo "To enable real deployment, configure one of:"
          echo "  - Docker Hub push + server pull"
          echo "  - GitHub Container Registry (ghcr.io)"
          echo "  - Cloud provider deployment (Railway, Render, Fly.io, etc.)"

  # ─── Post-Deploy Health Check ──────────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Run Health Check
        run: |
          chmod +x monitoring/health-check.sh
          # In a real deployment, set BACKEND_URL and FRONTEND_URL env vars
          echo "Health check script available at monitoring/health-check.sh"
          echo "Run against your production URLs after deployment."
